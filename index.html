  <style>
    /* ═══════════════════════════════════════════════
       PUBKEY BAR REFERENCE — Station Mode
       Speed-first. Signal over noise. Every pixel earns its keep.
       ═══════════════════════════════════════════════ */

    :root {
      --spring: cubic-bezier(0.2, 0.9, 0.3, 1.0);
      --spring-snappy: cubic-bezier(0.25, 0.46, 0.45, 0.94);

      /* Surfaces — warm undertone, never pure black */
      --surface-0: #080604;
      --surface-1: #0e0c0a;
      --surface-2: #141210;
      --surface-3: #1a1816;
      --surface-4: #221f1c;
      --surface-5: #2a2724;

      /* Materials */
      --material-regular: rgba(14, 12, 10, 0.82);

      /* Brand */
      --orange: #eb5528;
      --orange-vibrant: #ff6633;
      --orange-dim: rgba(235, 85, 40, 0.08);
      --orange-wash: rgba(235, 85, 40, 0.05);
      --orange-glow: rgba(255, 102, 51, 0.25);

      /* Text — warm, not cold */
      --text-primary: #ede8e0;
      --text-secondary: #8c8478;
      --text-tertiary: #5c564e;

      /* Separators */
      --separator: rgba(200, 170, 130, 0.06);

      /* Safe areas */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ═══════════════════════════════
       FOUNDATION
       ═══════════════════════════════ */

    #root, .app-shell {
      background: var(--surface-0) !important;
    }

    /* Global antialiasing */
    .app-shell, .app-shell * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════════════════════
       TYPOGRAPHY — Flow, not rigid
       Loosen the grid. Let text breathe.
       ═══════════════════════════════ */

    /* Headlines — open up condensed tracking, lighter weight for flow */
    .app-shell span[style*="font-family: var(--font-headline)"] {
      letter-spacing: 0.06em !important;
      font-weight: 700 !important; /* 700 not 900 — confident, not screaming */
    }

    /* Body text — bump light (300) to regular (400) on dark backgrounds */
    .app-shell div[style*="font-weight: 300"] {
      font-weight: 400 !important;
    }

    /* Mono labels — open up, add warmth with spacing */
    .app-shell div[style*="font-family: var(--font-mono)"],
    .app-shell span[style*="font-family: var(--font-mono)"] {
      letter-spacing: 0.03em !important;
    }

    /* All text in the scroll area — slightly more generous line-height */
    .page-scroll {
      line-height: 1.6;
    }

    /* ═══════════════════════════════
       TOP BAR — frosted material
       ═══════════════════════════════ */

    .app-shell > div:first-child {
      background: var(--material-regular) !important;
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator) !important;
      padding-top: calc(var(--safe-top) + 12px) !important;
      position: relative;
      z-index: 10;
    }

    .app-shell > div:first-child::after {
      content: '';
      position: absolute;
      bottom: -0.5px;
      left: 0; right: 0;
      height: 0.5px;
      background: linear-gradient(90deg,
        transparent 5%,
        rgba(235, 85, 40, 0.15) 20%,
        rgba(235, 85, 40, 0.25) 50%,
        rgba(235, 85, 40, 0.15) 80%,
        transparent 95%
      );
    }

    /* ═══════════════════════════════
       SUB-TABS (Cocktails: MENU/CLASSICS/PREVIOUS)
       ═══════════════════════════════ */

    /* Sub-tabs — minimal, not boxy */
    .flex.bg-surface,
    .page-scroll > div:first-child {
      background: transparent !important;
      border-bottom: 0.5px solid rgba(200, 170, 130, 0.06) !important;
      padding: 0 8px !important;
    }

    .flex.bg-surface button[style*="border-bottom: 2px solid"],
    .page-scroll > div:first-child button[style*="border-bottom: 2px solid"] {
      text-shadow: none;
      border-bottom-width: 1.5px !important;
    }

    .flex.bg-surface button[style*="border-color: currentcolor currentcolor transparent"],
    .page-scroll > div:first-child button[style*="border-color: currentcolor currentcolor transparent"] {
      color: var(--text-tertiary) !important;
      opacity: 0.7;
    }

    .flex.bg-surface button,
    .page-scroll > div:first-child button {
      transition: color 200ms var(--spring), border-color 200ms var(--spring), opacity 200ms ease !important;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
      font-size: 12px !important;
      letter-spacing: 0.08em !important;
    }

    /* ═══════════════════════════════
       BOTTOM NAV — vibrancy material
       ═══════════════════════════════ */

    .app-shell nav, nav[class*="border-t"] {
      background: var(--material-regular) !important;
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--separator) !important;
      padding-bottom: var(--safe-bottom) !important;
      position: relative;
      z-index: 10;
    }

    .app-shell nav::before, nav[class*="border-t"]::before {
      content: '';
      position: absolute;
      top: -0.5px;
      left: 0; right: 0;
      height: 0.5px;
      background: linear-gradient(90deg,
        transparent 10%,
        rgba(200, 170, 130, 0.08) 30%,
        rgba(200, 170, 130, 0.12) 50%,
        rgba(200, 170, 130, 0.08) 70%,
        transparent 90%
      );
    }

    /* Inactive nav — quiet */
    .app-shell nav button[style*="color: var(--color-gray-mid)"],
    nav[class*="border-t"] button[style*="color: var(--color-gray-mid)"] {
      color: var(--text-tertiary) !important;
      opacity: 0.6;
    }

    /* Inactive emoji icons — desaturate so they don't dominate */
    .app-shell nav button[style*="color: var(--color-gray-mid)"] span:first-child,
    nav[class*="border-t"] button[style*="color: var(--color-gray-mid)"] span:first-child {
      filter: grayscale(0.6) opacity(0.6);
    }

    /* Active nav icon — warm glow */
    .app-shell nav button[style*="color: var(--color-orange)"] span:first-child,
    nav[class*="border-t"] button[style*="color: var(--color-orange)"] span:first-child {
      filter: drop-shadow(0 1px 6px var(--orange-glow));
    }

    .app-shell nav button, nav[class*="border-t"] button {
      transition: transform 150ms var(--spring), color 200ms var(--spring) !important;
      -webkit-tap-highlight-color: transparent;
      min-height: 56px;
    }

    .app-shell nav button:active, nav[class*="border-t"] button:active {
      transform: scale(0.88);
    }

    /* ═══════════════════════════════
       COCKTAIL LIST ITEMS (buttons)
       ═══════════════════════════════ */

    /* Visible warm separators — items need real dividers, not invisible hairlines */
    .page-scroll button[style*="border-width: medium medium 1px"],
    .page-scroll button[style*="border-bottom"] {
      border-bottom-color: rgba(200, 170, 130, 0.08) !important;
    }

    .page-scroll > div > div:last-child > button {
      position: relative;
      padding: 22px 20px 22px 16px !important;
      min-height: 72px;
      transition: background-color 120ms ease;
      -webkit-tap-highlight-color: transparent;
      animation: itemIn 150ms var(--spring) both;
    }

    /* Alternating surface — subtle even/odd rhythm breaks the wall-of-text */
    .page-scroll > div > div:last-child > button:nth-child(even) {
      background-color: rgba(200, 170, 130, 0.015) !important;
    }

    /* Left accent bar on hover/touch */
    .page-scroll > div > div:last-child > button::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 2.5px; height: 0;
      background: var(--orange);
      border-radius: 2px;
      transform: translateY(-50%);
      transition: height 300ms var(--spring), opacity 300ms var(--spring);
      opacity: 0;
    }

    .page-scroll > div > div:last-child > button:hover::before {
      height: 60%; opacity: 1;
    }

    .page-scroll > div > div:last-child > button:active::before {
      height: 80%; opacity: 0.8;
    }

    .page-scroll > div > div:last-child > button:active {
      background-color: rgba(200, 170, 130, 0.06) !important;
      transition: background-color 0ms;
    }

    .page-scroll > div > div:last-child > button:hover {
      background-color: rgba(235, 85, 40, 0.03) !important;
    }

    /* Cocktail name — generous, confident */
    .page-scroll button div[style*="font-size: 22px"][style*="color: var(--color-white)"] {
      color: var(--text-primary) !important;
      line-height: 1.35 !important;
      letter-spacing: 0.005em;
    }

    /* Glass + Method — indented, lighter, creates a visual "notch" for fast scanning */
    .page-scroll button div[style*="font-size: 13px"][style*="color: var(--color-gray-mid)"] {
      font-size: 12.5px !important;
      color: var(--text-secondary) !important;
      letter-spacing: 0.05em;
      line-height: 1.5 !important;
      margin-top: 5px !important;
      opacity: 0.75;
    }

    /* Chevron — subtle directional hint */
    .page-scroll button > div:last-child > span:last-child {
      transition: transform 250ms var(--spring), opacity 250ms var(--spring);
      opacity: 0.15;
      font-size: 14px !important;
    }

    .page-scroll button:hover > div:last-child > span:last-child {
      transform: translateX(3px); opacity: 0.4;
    }

    /* Price — ghost-level for staff */
    .page-scroll button div[style*="font-family: var(--font-mono)"][style*="color: var(--color-orange)"] {
      opacity: 0.25;
      font-size: 12px !important;
    }

    /* Section labels — editorial rule line */
    .page-scroll > div > div:last-child > div:first-child {
      color: var(--text-tertiary) !important;
      position: relative;
      padding-top: 16px !important;
      padding-bottom: 10px !important;
      border-bottom: 0.5px solid rgba(200, 170, 130, 0.06);
      margin-bottom: 4px;
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════
       SPIRITS & MODS — Category items (divs, not buttons)
       ═══════════════════════════════ */

    /* Category headers — editorial, not industrial */
    .page-scroll > div > div > div[style*="padding: 12px 16px 6px"][style*="font-family: var(--font-headline)"] {
      border-bottom: 1px solid rgba(235, 85, 40, 0.10) !important;
      padding-bottom: 10px !important;
      padding-top: 20px !important;
      margin-top: 4px;
      letter-spacing: 0.08em !important;
      font-weight: 700 !important;
    }

    /* Distributor codes — barely visible, staff don't need mid-service */
    .page-scroll > div > div > div[style*="padding: 16px"][style*="display: flex"] > div[style*="flex-shrink: 0"][style*="font-family: var(--font-mono)"] {
      opacity: 0.15 !important;
      font-size: 9px !important;
    }

    /* Tier legend — compact single row */
    .page-scroll > div > div:first-child[style] {
      padding-top: 6px !important;
      padding-bottom: 6px !important;
    }

    /* Spirit/Mod item names — warm, generous spacing */
    .page-scroll > div > div > div[style*="padding: 16px"] div[style*="font-size: 19px"] {
      color: var(--text-primary) !important;
      line-height: 1.3 !important;
      letter-spacing: 0.005em;
    }

    /* Spirit sub-type label (mono) — more air */
    .page-scroll > div > div > div[style*="padding: 16px"] div[style*="font-family: var(--font-mono)"][style*="font-size: 13px"] {
      line-height: 1.5 !important;
      margin-top: 3px !important;
      letter-spacing: 0.04em !important;
    }

    /* Descriptions — comfortable reading weight + height */
    .page-scroll > div > div > div[style*="padding: 16px"] div[style*="font-weight: 300"] {
      line-height: 1.65 !important;
      font-weight: 400 !important;
      margin-top: 6px !important;
    }

    /* Spirit usage notes (↳) — key context, breathable */
    .page-scroll > div > div > div[style*="padding: 16px"] div[style*="color: rgba(235"] {
      font-size: 13px !important;
      line-height: 1.6 !important;
      margin-top: 6px !important;
      opacity: 0.9;
    }

    /* Spacing between items — breathing room + visible separators */
    .page-scroll > div > div > div[style*="padding: 16px"][style*="border-bottom"] {
      padding-top: 20px !important;
      padding-bottom: 20px !important;
      border-bottom-color: rgba(200, 170, 130, 0.07) !important;
    }

    /* Alternating surface on spirit/mod items */
    .page-scroll > div > div > div[style*="padding: 16px"][style*="border-bottom"]:nth-child(odd) {
      background-color: rgba(200, 170, 130, 0.012);
    }

    /* ═══════════════════════════════
       COCKTAIL DETAIL VIEW
       ═══════════════════════════════ */

    /* Back button — way bigger touch target, easier to reach */
    .page-scroll button[style*="gap: 4px"][style*="align-items: center"],
    .page-scroll > div > div > button:first-child {
      min-height: 48px !important;
      min-width: 80px !important;
      padding: 12px 16px !important;
      font-size: 16px !important;
      border-radius: 10px;
      margin: 4px 0 !important;
      transition: background-color 150ms ease;
    }

    .page-scroll button[style*="gap: 4px"][style*="align-items: center"]:active,
    .page-scroll > div > div > button:first-child:active {
      background-color: var(--surface-3) !important;
    }

    /* Cocktail title in detail — hero, fluid */
    .page-scroll > div > div > div[style*="font-size: 28px"],
    .page-scroll > div > div > div[style*="font-size: 26px"],
    .page-scroll > div > div > div[style*="font-size: 24px"] {
      font-size: 30px !important;
      line-height: 1.2 !important;
      letter-spacing: -0.005em;
      padding-bottom: 14px !important;
    }

    /* Tag pills below title — more space between them */
    .page-scroll > div > div > div > span[style*="border-radius"][style*="padding"] {
      margin-bottom: 4px !important;
      letter-spacing: 0.02em;
    }

    /* Garnish line — let it breathe */
    .page-scroll > div > div > div[style*="font-family: var(--font-mono)"][style*="border-radius"][style*="padding: 6px"] {
      line-height: 1.6 !important;
      letter-spacing: 0.02em;
      margin-top: 8px !important;
      margin-bottom: 8px !important;
    }

    /* Quick Build — reads like spoken instructions, not a code dump */
    .quick-build-text {
      color: var(--text-primary) !important;
      font-size: 1.1rem !important;
      line-height: 2.2 !important;
      letter-spacing: 0.015em;
      word-spacing: 0.06em;
      padding: 20px 12px !important;
      -webkit-font-smoothing: antialiased;
    }

    /* Quick Build container — elevated, highlighted */
    div[style*="background"]:has(> .quick-build-text),
    div[style*="background"]:has(> span[style*="QUICK BUILD"]),
    div:has(> span[style*="font-size: 11px"][style*="letter-spacing"]):has(~ .quick-build-text) {
      border-left: 3px solid var(--orange) !important;
      border-radius: 0 8px 8px 0 !important;
    }

    /* "QUICK BUILD" label — make it pop */
    span[style*="QUICK BUILD"],
    span[style*="font-size: 11px"][style*="letter-spacing: 0.1em"] {
      color: var(--orange-vibrant) !important;
    }

    /* Service Notes container — distinct from Quick Build */
    div[style*="border-left: 3px solid"]:has(> span[style*="SERVICE NOTES"]),
    div:has(> span[style*="SERVICE NOTES"]) {
      border-left-color: var(--text-tertiary) !important;
      opacity: 0.85;
    }

    /* Tag pills in detail view (price, glass, method) */
    .page-scroll > div > div > div > span[style*="border-radius"] {
      font-size: 12px !important;
    }

    /* Ingredients section header */
    span[style*="font-size: 11px"][style*="letter-spacing"]:not(:empty) {
      font-size: 10px !important;
      letter-spacing: 0.12em !important;
    }

    /* View Batch Recipe link — prominent for prep work */
    .page-scroll a[style*="display: flex"],
    .page-scroll div[style*="cursor: pointer"][style*="display: flex"][style*="border-radius"] {
      min-height: 48px;
    }

    /* ═══════════════════════════════
       BEER TAB
       ═══════════════════════════════ */

    /* Tap number label */
    .page-scroll > div > div > div[style*="padding: 16px"] span[style*="font-family: var(--font-mono)"] {
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* Beer service notes (italic orange) — more breathing room */
    .page-scroll > div > div > div[style*="padding: 16px"] div[style*="font-style: italic"] {
      line-height: 1.6 !important;
      margin-top: 8px !important;
    }

    /* ═══════════════════════════════
       WINE TAB — make it useful, not a dead end
       ═══════════════════════════════ */

    /* "Ask bar manager" text — style as a clear action, not a shrug */
    .page-scroll > div > div > div[style*="padding: 16px"] div[style*="font-style: italic"][style*="color: rgba(235"] {
      font-style: normal !important;
      padding: 6px 10px;
      background: rgba(235, 85, 40, 0.06);
      border-radius: 6px;
      margin-top: 8px;
      display: inline-block;
    }

    /* ═══════════════════════════════
       TBD ITEMS — dead ends, not traps
       ═══════════════════════════════ */

    .page-scroll button:has(span[style*="background: rgba(235, 85, 40"]) {
      opacity: 0.3 !important;
      pointer-events: none;
      position: relative;
    }

    /* Hide the entire price+chevron column on TBD items */
    .page-scroll button:has(span[style*="background: rgba(235, 85, 40"]) > div:last-child {
      visibility: hidden !important;
    }

    /* "COMING SOON" badge replaces price */
    .page-scroll button:has(span[style*="background: rgba(235, 85, 40"])::after {
      content: 'COMING SOON';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: "Space Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      background: var(--surface-3);
      padding: 3px 8px;
      border-radius: 4px;
      z-index: 2;
    }

    /* ═══════════════════════════════
       SHEET (detail modal for non-cocktail items)
       ═══════════════════════════════ */

    .sheet-panel {
      background: var(--surface-3) !important;
      border-radius: 14px 14px 0 0 !important;
      border-top: 0.5px solid rgba(200, 170, 130, 0.1);
      box-shadow:
        0 -1px 0 rgba(200, 170, 130, 0.04),
        0 -4px 16px rgba(0, 0, 0, 0.3),
        0 -16px 48px rgba(0, 0, 0, 0.4);
      animation: sheetReveal 120ms var(--spring-snappy) !important;
      max-height: 90dvh !important;
      padding-bottom: calc(var(--safe-bottom) + 16px) !important;
    }

    .sheet-panel::before {
      content: '';
      display: block;
      width: 36px; height: 5px;
      background: rgba(200, 170, 130, 0.2);
      border-radius: 2.5px;
      margin: 8px auto 4px;
    }

    .sheet-panel div[style*="border-bottom"] {
      padding-block: 10px !important;
    }

    .sheet-backdrop {
      background: rgba(0, 0, 0, 0.6) !important;
      -webkit-backdrop-filter: saturate(120%) blur(24px);
      backdrop-filter: saturate(120%) blur(24px);
      animation: backdropFade 80ms ease both !important;
    }

    @keyframes sheetReveal {
      from { transform: translate(-50%, 40%); opacity: 0.5; }
      to   { transform: translate(-50%, 0); opacity: 1; }
    }

    @keyframes backdropFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ═══════════════════════════════
       SEARCH
       ═══════════════════════════════ */

    .page-scroll input[type="text"],
    .page-scroll input[placeholder*="earch"] {
      font-size: 16px !important;
      padding: 12px 16px !important;
      border-radius: 12px !important;
      background: var(--surface-3) !important;
      border: 1px solid rgba(200, 170, 130, 0.12) !important;
      color: var(--text-primary) !important;
      min-height: 48px;
    }

    .page-scroll input:focus {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 2px rgba(235, 85, 40, 0.15) !important;
    }

    .page-scroll input::placeholder {
      color: var(--text-tertiary) !important;
    }

    /* ═══════════════════════════════
       ALPHA INDEX
       ═══════════════════════════════ */

    .alpha-index { right: 2px !important; }

    .alpha-index button {
      color: var(--text-tertiary) !important;
      font-size: 10px !important;
      padding: 3px 6px !important;
      min-width: 24px;
      min-height: 20px;
      transition: color 100ms ease;
    }

    .alpha-index button:active {
      color: var(--orange-vibrant) !important;
    }

    /* ═══════════════════════════════
       SCROLLBAR
       ═══════════════════════════════ */

    .page-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(200, 170, 130, 0.12) transparent;
    }

    .page-scroll::-webkit-scrollbar { width: 2px; }
    .page-scroll::-webkit-scrollbar-track { background: transparent; }
    .page-scroll::-webkit-scrollbar-thumb { background: rgba(200, 170, 130, 0.12); border-radius: 2px; }

    /* ═══════════════════════════════
       MOTION — fast, not flashy
       ═══════════════════════════════ */

    .app-shell {
      animation: fadeIn 200ms var(--spring) both;
    }

    .app-shell > div:first-child {
      animation: fadeIn 200ms var(--spring) both;
    }

    .app-shell > nav, .app-shell nav[class*="border-t"] {
      animation: fadeIn 200ms var(--spring) both;
    }

    .page-scroll > div > div:last-child > div:first-child {
      animation: fadeIn 100ms var(--spring) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ═══════════════════════════════
       STAFF BADGE
       ═══════════════════════════════ */

    #staff-badge {
      position: fixed;
      top: calc(var(--safe-top) + 8px);
      right: 12px;
      z-index: 50;
      font-family: "Space Mono", monospace;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      background: var(--surface-3);
      border: 0.5px solid var(--separator);
      padding: 2px 6px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0.5;
    }

    /* ═══════════════════════════════
       WAKE LOCK STATUS
       ═══════════════════════════════ */

    #wake-lock-status {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 45;
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      background: var(--surface-3);
      border: 0.5px solid var(--separator);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    #wake-lock-status.visible { opacity: 1; }
    #wake-lock-status.active {
      color: #b89860;
      border-color: rgba(184, 152, 96, 0.2);
    }

    /* ═══════════════════════════════
       ACCESSIBILITY
       ═══════════════════════════════ */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    *:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 2px;
      border-radius: 4px;
    }

  </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="sheet-root"></div>

    <!-- Staff badge -->
    <div id="staff-badge">STAFF</div>

    <!-- Wake lock status -->
    <div id="wake-lock-status"></div>

    <script>
    (function() {
      'use strict';

      // ── WAKE LOCK ──
      let wakeLock = null;
      const wakeLockEl = document.getElementById('wake-lock-status');

      async function requestWakeLock() {
        if (!('wakeLock' in navigator)) return;
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLockEl.textContent = '☀ SCREEN ON';
          wakeLockEl.classList.add('visible', 'active');
          setTimeout(() => wakeLockEl.classList.remove('visible'), 3000);
          wakeLock.addEventListener('release', () => {
            wakeLockEl.textContent = '🌙 SCREEN OFF';
            wakeLockEl.classList.remove('active');
            wakeLockEl.classList.add('visible');
            setTimeout(() => wakeLockEl.classList.remove('visible'), 2000);
          });
        } catch (e) {}
      }

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') requestWakeLock();
      });
      requestWakeLock();

      // ── KEYBOARD SHORTCUTS ──
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' || ((e.metaKey || e.ctrlKey) && e.key === 'k')) {
          e.preventDefault();
          const input = document.querySelector('.page-scroll input[type="text"], .page-scroll input[placeholder*="earch"]');
          if (input) { input.focus(); input.select(); }
        }
        if (e.key === 'Escape') {
          const backdrop = document.querySelector('.sheet-backdrop');
          if (backdrop) backdrop.click();
        }
      });

      // ── HAPTIC ON SHEET OPEN ──
      const sheetRoot = document.getElementById('sheet-root');
      if (sheetRoot) {
        new MutationObserver((mutations) => {
          for (const m of mutations) {
            for (const node of m.addedNodes) {
              if (node.classList?.contains('sheet-panel') && navigator.vibrate) {
                navigator.vibrate(10);
              }
            }
          }
        }).observe(sheetRoot, { childList: true, subtree: true });
      }

      // ── CONTENT ENHANCEMENTS ──
      // Runs on every content change: sorts categories, strips count numbers,
      // hides distributor noise, and scrolls to top on tab switch.

      let lastContentKey = '';

      function enhanceContent() {
        const pageScroll = document.querySelector('.page-scroll');
        if (!pageScroll) return;

        sortCategoryItems(pageScroll);
        stripCategoryCounts(pageScroll);
        dimDistributorCodes(pageScroll);
      }

      // Sort Spirits & Mods items A-Z within each category
      function sortCategoryItems(pageScroll) {
        const wrapper = findCategoryWrapper(pageScroll);
        if (!wrapper) return;

        Array.from(wrapper.children).forEach(cat => {
          const items = Array.from(cat.children).slice(1);
          if (items.length < 2 || items[0]?.tagName === 'SPAN') return;

          const getName = (el) => {
            const nameDiv = el.children?.[1]?.children?.[0];
            return (nameDiv?.textContent || '').trim().toLowerCase();
          };

          const names = items.map(getName);
          const sorted = [...names].sort((a, b) => a.localeCompare(b));
          if (names.every((n, i) => n === sorted[i])) return;

          items
            .sort((a, b) => getName(a).localeCompare(getName(b)))
            .forEach(item => cat.appendChild(item));
        });
      }

      // Strip trailing count from category headers: "BOURBON6" → "BOURBON"
      function stripCategoryCounts(pageScroll) {
        const wrapper = findCategoryWrapper(pageScroll);
        if (!wrapper) return;

        Array.from(wrapper.children).forEach(cat => {
          const header = cat.children?.[0];
          if (!header) return;
          // The header has a structure like: <div><span>BOURBON</span><span>6</span></div>
          // OR it might be a single text node like "BOURBON6"
          // Find the count span — it's usually the last child with just a number
          const kids = Array.from(header.children);
          kids.forEach(kid => {
            const txt = kid.textContent?.trim();
            if (txt && /^\d+$/.test(txt) && !kid.dataset.enhanced) {
              kid.style.opacity = '0.25';
              kid.style.fontSize = '10px';
              kid.style.marginLeft = '6px';
              kid.dataset.enhanced = '1';
            }
          });
        });
      }

      // Further dim distributor codes (RNDC, SGWS, DOPS, Breakthru)
      function dimDistributorCodes(pageScroll) {
        const wrapper = findCategoryWrapper(pageScroll);
        if (!wrapper) return;

        Array.from(wrapper.children).forEach(cat => {
          Array.from(cat.children).slice(1).forEach(item => {
            // Distributor code is the last direct child div with mono font
            const lastDiv = item.children?.[item.children.length - 1];
            if (!lastDiv || lastDiv.dataset.dimmed) return;
            const style = lastDiv.getAttribute('style') || '';
            if (style.includes('font-mono') && (style.includes('11px') || style.includes('13px')) && style.includes('flex-shrink')) {
              lastDiv.style.opacity = '0.15';
              lastDiv.style.fontSize = '9px';
              lastDiv.dataset.dimmed = '1';
            }
          });
        });
      }

      function findCategoryWrapper(pageScroll) {
        return Array.from(pageScroll.children).find(c => {
          const firstKid = c.children?.[0];
          if (!firstKid) return false;
          const fc = firstKid.children?.[0];
          if (!fc) return false;
          const txt = fc.textContent || '';
          return /^[A-Z &\-]+\d+$/.test(txt.trim()) || txt.trim() === 'TIER:';
        });
      }

      // ── MAIN OBSERVER ──
      const root = document.getElementById('root');
      if (root) {
        new MutationObserver(() => {
          const pageScroll = document.querySelector('.page-scroll');
          if (!pageScroll) return;

          const firstHeader = pageScroll.querySelector('div > div:first-child');
          const key = firstHeader ? firstHeader.textContent.substring(0, 20) : '';
          if (key && key !== lastContentKey) {
            lastContentKey = key;
            if (pageScroll.scrollTop > 200) {
              pageScroll.scrollTo({ top: 0, behavior: 'smooth' });
            }
            enhanceContent();
          }
        }).observe(root, { childList: true, subtree: true });

        setTimeout(enhanceContent, 500);
      }

    })();
    </script>

</body></html>
