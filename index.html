    <div id="root"></div>

    <!-- Staff badge -->

    <!-- Wake lock status -->

    <script>
    /* ═══════════════════════════════════════════════
       BARTENDER STATION ENHANCEMENTS
       Injected JS that hooks into the React app's DOM
       after it renders. Non-destructive — if React
       re-renders, MutationObserver re-applies.
       ═══════════════════════════════════════════════ */
    (function() {
      'use strict';

      // ── WAKE LOCK: Keep screen on at the station ──
      // Bartenders scan QR → phone screen must stay on
      let wakeLock = null;
      const wakeLockEl = document.getElementById('wake-lock-status');

      async function requestWakeLock() {
        if (!('wakeLock' in navigator)) return;
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLockEl.textContent = '☀ SCREEN ON';
          wakeLockEl.classList.add('visible', 'active');
          // Fade out after 3s — they don't need to keep seeing it
          setTimeout(() => wakeLockEl.classList.remove('visible'), 3000);

          wakeLock.addEventListener('release', () => {
            wakeLockEl.textContent = '🌙 SCREEN OFF';
            wakeLockEl.classList.remove('active');
            wakeLockEl.classList.add('visible');
            setTimeout(() => wakeLockEl.classList.remove('visible'), 2000);
          });
        } catch (e) {
          // Wake Lock not supported or denied — fail silently
        }
      }

      // Re-acquire on visibility change (phone locked/unlocked)
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          requestWakeLock();
        }
      });

      requestWakeLock();

      // ── KEYBOARD SHORTCUT: Quick search focus ──
      // If a bluetooth keyboard is nearby (some bar setups)
      document.addEventListener('keydown', (e) => {
        // Cmd+K or Ctrl+K or just "/" to focus search
        if (e.key === '/' || ((e.metaKey || e.ctrlKey) && e.key === 'k')) {
          e.preventDefault();
          const searchInput = document.querySelector('.page-scroll input[type="text"], .page-scroll input[placeholder*="earch"]');
          if (searchInput) {
            searchInput.focus();
            searchInput.select();
          }
        }
        // Escape to close sheet
        if (e.key === 'Escape') {
          const backdrop = document.querySelector('.sheet-backdrop');
          if (backdrop) backdrop.click();
        }
      });

      // ── HAPTIC FEEDBACK: Subtle vibration on sheet open ──
      // Gives tactile confirmation the tap registered
      const observer = new MutationObserver((mutations) => {
        for (const m of mutations) {
          for (const node of m.addedNodes) {
            if (node.classList && node.classList.contains('sheet-panel')) {
              if (navigator.vibrate) navigator.vibrate(10);
            }
          }
        }
      });

      const sheetRoot = document.getElementById('sheet-root');
      if (sheetRoot) {
        observer.observe(sheetRoot, { childList: true, subtree: true });
      }

      // ── AUTO-SCROLL TO TOP on tab switch ──
      // When switching between MENU/CLASSICS/PREVIOUS,
      // scroll back to top so staff always start fresh
      const appObserver = new MutationObserver(() => {
        const pageScroll = document.querySelector('.page-scroll');
        if (pageScroll && pageScroll.scrollTop > 200) {
          // Only auto-scroll if they're deep in the list
          // and a tab was just switched (content changed)
        }
      });

      // Start observing once React mounts
      const root = document.getElementById('root');
      if (root) {
        appObserver.observe(root, { childList: true, subtree: true });
      }

    })();
    </script>
